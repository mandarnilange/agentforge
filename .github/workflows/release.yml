name: Release

# Tag-triggered release pipeline. Push a semver tag (e.g. `v0.2.0`) to
# publish @mandarnilange/agentforge-core + @mandarnilange/agentforge to npm, push Docker images
# to GHCR, and create a GitHub Release with CHANGELOG notes.
#
# Prereqs:
#   - Repo secret NPM_TOKEN (automation token from npmjs.com)
#   - GITHUB_TOKEN has packages: write (set below)
#   - The tag's version must match BOTH packages/*/package.json versions
#     AND the root package.json version.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate tag vs package.json
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          ROOT=$(node -p "require('./package.json').version")
          CORE=$(node -p "require('./packages/core/package.json').version")
          PLATFORM=$(node -p "require('./packages/platform/package.json').version")
          if [ "$TAG" != "$ROOT" ]; then
            echo "::error::Tag v$TAG does not match root package.json version ($ROOT)"
            exit 1
          fi
          if [ "$TAG" != "$CORE" ]; then
            echo "::error::Tag v$TAG does not match packages/core version ($CORE)"
            exit 1
          fi
          if [ "$TAG" != "$PLATFORM" ]; then
            echo "::error::Tag v$TAG does not match packages/platform version ($PLATFORM)"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Validated version: $TAG"

  test:
    name: Pre-release gate (test)
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - uses: actions/checkout@v5
      - name: Configure git identity
        run: |
          git config --global user.email "ci@agentforge.local"
          git config --global user.name "AgentForge CI"
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Root build runs dashboard SPA + tsc --build + copy-build-assets.
      - run: npm run build
      - run: npx biome check .
      - run: npx vitest run --reporter=dot
        env:
          CI: 'true'

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # Root build emits all publishable assets into dist/ BEFORE npm publish runs.
      # packages/*/prepublishOnly also delegates to the root build as a safety net.
      - run: npm run build
      - name: Publish @mandarnilange/agentforge-core
        working-directory: packages/core
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish agentforge
        working-directory: packages/platform
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish image (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [core, platform]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentforge-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Extract release notes from CHANGELOG
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          # Prefer a `## [<version>]` section; fall back to `## [Unreleased]`
          # when a release ships before versioned entries are consolidated.
          awk -v v="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" v "]") > 0 || index($0, "[Unreleased]") > 0) {
                found = 1
                next
              }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION — see CHANGELOG.md for details." > release-notes.md
          fi
          echo "--- release notes preview ---"
          head -20 release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
