apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: developer
  displayName: Developer
  description: Full Stack Developer — generates production code with automated test-fix loop
  phase: "3"
  role: developer
  humanEquivalent: Full Stack Developer

spec:
  executor: pi-coding-agent

  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 32768
    thinking: high

  systemPrompt:
    file: prompts/developer.system.md

  tools:
    - read
    - write
    - edit
    - bash
    - grep
    - find

  inputs:
    - type: requirements
      required: true
    - type: architecture-plan
      required: true

  outputs:
    - type: code-output
      schema: schemas/code-output.schema.yaml

  definitions:
    setup-workspace:
      type: script
      run: |
        cd {{run.workdir}}
        mkdir -p src tests docs
        echo "Workspace ready at {{run.workdir}}"
      description: Initialise workspace directory structure
      continueOnError: true

    validate-inputs:
      type: validate
      schema: architecture-plan
      input: architecture-plan
      description: Verify architecture-plan artifact is structurally valid before starting

    generate-code:
      type: llm
      instructions: |
        Generate the full implementation based on the requirements and architecture plan.
        Create all source files, set up dependencies, and write initial tests.

    lint-and-format:
      type: script
      run: |
        cd {{run.workdir}}
        # Auto-detect and run the project's linter/formatter
        if [ -f package.json ]; then
          npx eslint src/ --fix 2>&1 || true
          npx prettier --write "src/**/*.{ts,js,tsx,jsx}" 2>&1 || true
        elif [ -f pyproject.toml ] || [ -f setup.py ]; then
          python -m black . 2>&1 || true
          python -m ruff check --fix . 2>&1 || true
        elif [ -f go.mod ]; then
          gofmt -w . 2>&1 || true
        fi
        echo "Lint complete"
      description: Lint and format all generated source files
      continueOnError: true
      captureOutput: true

    run-tests:
      type: script
      run: |
        cd {{run.workdir}}
        if [ -f package.json ]; then
          npm test 2>&1
        elif [ -f pyproject.toml ] || [ -f setup.py ]; then
          python -m pytest -v 2>&1
        elif [ -f go.mod ]; then
          go test ./... 2>&1
        else
          echo "No test runner detected"
        fi
      description: Execute the test suite and capture results
      continueOnError: true
      captureOutput: true

    test-gate:
      type: script
      run: |
        if [ "{{steps.run-tests.exitCode}}" = "0" ]; then
          echo "PASS"
        else
          echo "false"
        fi
      description: >
        Outputs "PASS" when all tests pass (exits the fix loop),
        "false" when tests fail (continues the loop for another fix attempt).
      continueOnError: true

    needs-fix:
      type: script
      run: |
        if [ "{{steps.run-tests.exitCode}}" = "0" ]; then
          echo "false"
        else
          echo "fix"
        fi
      description: >
        Outputs "fix" when tests are failing (triggers fix-code step),
        "false" when passing (skips fix-code entirely).
      continueOnError: true

    fix-code:
      type: llm
      instructions: |
        Fix attempt {{loop.iteration}} of {{loop.maxIterations}}.

        The following tests are failing:
        {{steps.run-tests.output}}

        Analyse each failure carefully:
        1. Identify the root cause (logic error, missing import, wrong type, etc.)
        2. Fix the source code — do not modify tests unless they have a genuine bug
        3. If the same test is failing repeatedly, try a different approach
        4. Verify the fix makes sense in context before applying

    validate-output:
      type: validate
      schema: code-output
      description: Validate the code-output artifact against its schema
      continueOnError: true

    git-commit:
      type: script
      run: |
        cd {{run.workdir}}
        if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          echo "Skipped: not a git repository"
          exit 0
        fi
        git add -A
        if git diff --cached --quiet; then
          echo "Skipped: no staged changes"
          exit 0
        fi
        git commit -m "feat(developer): generate implementation for pipeline {{pipeline.id}}"
        echo "Committed"
      description: Commit all generated files to the project repository
      continueOnError: true

  flow:
    # Phase 1: Prepare
    - step: setup-workspace
    - step: validate-inputs

    # Phase 2: Generate and lint (once)
    - step: generate-code
    - step: lint-and-format

    # Phase 3: Test → fix loop (up to 3 attempts)
    - loop:
        until: "{{steps.test-gate.output}}"
        maxIterations: 3
        do:
          - step: run-tests
          - step: test-gate
          - step: needs-fix
          - step: fix-code
            condition: "{{steps.needs-fix.output}}"

    # Phase 4: Finalise
    - step: validate-output
    - step: git-commit

  nodeAffinity:
    preferred:
      - capability: docker
      - capability: git

  resources:
    budget:
      maxTotalTokens: 120000
      maxCostUsd: 0.60
    # Coding agents do iterative work; give them a longer wall-clock budget.
    # Overrides AGENTFORGE_LLM_TIMEOUT_SECONDS (default 600s). Set to 0 to disable.
    timeoutSeconds: 1200
