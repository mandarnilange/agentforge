apiVersion: agentforge/v1
kind: NodeDefinition
metadata:
  name: docker-runner
  displayName: Docker Runner
  description: Runs coding agents in isolated Docker containers — requires agentforge

spec:
  type: docker
  capabilities:
    - docker
    - git
    - llm-access
  image: node:20-slim
  resources:
    maxConcurrentAgents: 4
    memory: 2g
    cpu: "2"
