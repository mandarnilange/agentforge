apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: doc-writer
  displayName: Doc Writer
  description: Technical Writer — produces API documentation, usage guides, and Postman collection from spec and code
  phase: "3"
  role: technical-writer
  humanEquivalent: Technical Writer

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: low

  systemPrompt:
    file: prompts/doc-writer.system.md

  inputs:
    - type: api-spec
      required: true
    - type: api-code
      required: true
    - type: test-suite
      required: false

  outputs:
    - type: api-docs
      schema: schemas/api-docs.schema.yaml

  resources:
    budget:
      maxTotalTokens: 30000
      maxCostUsd: 0.08
