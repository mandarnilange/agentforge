apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: spec-writer
  displayName: Spec Writer
  description: API Specification Writer — transforms project briefs into a complete OpenAPI spec
  phase: "1"
  role: api-designer
  humanEquivalent: API Designer

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: medium

  systemPrompt:
    file: prompts/spec-writer.system.md

  inputs:
    - type: raw-brief
      required: true

  outputs:
    - type: api-spec
      schema: schemas/api-spec.schema.yaml

  resources:
    budget:
      maxTotalTokens: 40000
      maxCostUsd: 0.10
