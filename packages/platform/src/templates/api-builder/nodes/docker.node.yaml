apiVersion: agentforge/v1
kind: NodeDefinition
metadata:
  name: docker-runner
  displayName: Docker Runner
  description: Isolated Docker containers for code generation — requires agentforge
spec:
  type: docker
  capabilities: [docker, git, llm-access]
  image: node:20-slim
  resources:
    maxConcurrentRuns: 4
    memory: 2g
    cpu: "2"
