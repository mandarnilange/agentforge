apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: report-writer
  displayName: Report Writer
  description: Report Writer — consolidates quality and security findings into a prioritised review report
  phase: "3"
  role: technical-writer
  humanEquivalent: Tech Lead

spec:
  executor: pi-ai
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    maxTokens: 16384
    thinking: medium
  systemPrompt:
    file: prompts/report-writer.system.md
  inputs:
    - type: review-scope
      required: true
    - type: quality-findings
      required: true
    - type: security-findings
      required: true
  outputs:
    - type: review-report
      schema: schemas/review-report.schema.yaml
  resources:
    budget:
      maxTotalTokens: 30000
      maxCostUsd: 0.08
