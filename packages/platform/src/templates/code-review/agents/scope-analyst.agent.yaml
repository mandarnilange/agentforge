apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: scope-analyst
  displayName: Scope Analyst
  description: Review Scope Analyst — understands the changeset context and defines review focus areas
  phase: "1"
  role: analyst
  humanEquivalent: Senior Engineer

spec:
  executor: pi-ai
  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: medium
  systemPrompt:
    file: prompts/scope-analyst.system.md
  inputs:
    - type: raw-brief
      required: true
  outputs:
    - type: review-scope
      schema: schemas/review-scope.schema.yaml
  resources:
    budget:
      maxTotalTokens: 30000
      maxCostUsd: 0.08
