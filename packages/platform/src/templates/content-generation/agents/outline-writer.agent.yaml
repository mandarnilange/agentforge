apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: outline-writer
  displayName: Outline Writer
  description: Content Strategist — creates a structured outline with sections, key points, and content goals
  phase: "2"
  role: content-strategist
  humanEquivalent: Content Strategist

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-6
    maxTokens: 16384
    thinking: medium

  systemPrompt:
    file: prompts/outline-writer.system.md

  inputs:
    - type: raw-brief
      required: true
    - type: research-notes
      required: true

  outputs:
    - type: content-outline
      schema: schemas/content-outline.schema.yaml

  resources:
    budget:
      maxTotalTokens: 30000
      maxCostUsd: 0.08
