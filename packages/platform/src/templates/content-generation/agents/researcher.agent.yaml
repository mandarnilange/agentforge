apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: researcher
  displayName: Researcher
  description: Content Researcher — gathers facts, sources, statistics, and angles for the topic
  phase: "1"
  role: researcher
  humanEquivalent: Content Researcher

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: medium

  systemPrompt:
    file: prompts/researcher.system.md

  inputs:
    - type: raw-brief
      required: true

  outputs:
    - type: research-notes
      schema: schemas/research-notes.schema.yaml

  resources:
    budget:
      maxTotalTokens: 40000
      maxCostUsd: 0.10
