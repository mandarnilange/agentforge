apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: seo-optimizer
  displayName: SEO Optimizer
  description: SEO Specialist — optimises the edited content for search visibility with meta tags and keyword placement
  phase: "5"
  role: seo-specialist
  humanEquivalent: SEO Specialist

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-6
    maxTokens: 16384
    thinking: medium

  systemPrompt:
    file: prompts/seo-optimizer.system.md

  inputs:
    - type: edited-content
      required: true
    - type: raw-brief
      required: true

  outputs:
    - type: published-content
      schema: schemas/published-content.schema.yaml

  resources:
    budget:
      maxTotalTokens: 30000
      maxCostUsd: 0.08
