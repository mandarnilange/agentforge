apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: loader
  displayName: Loader
  description: Data Platform Engineer — generates deployment config and cloud loader for the target data store
  phase: "5"
  role: data-platform-engineer
  humanEquivalent: Data Platform Engineer

spec:
  executor: pi-ai
  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: medium
  systemPrompt:
    file: prompts/loader.system.md
  inputs:
    - type: data-schema
      required: true
    - type: transform-code
      required: true
    - type: validation-report
      required: true
  outputs:
    - type: deployment-config
      schema: schemas/pipeline-deployment-config.schema.yaml
  resources:
    budget:
      maxTotalTokens: 30000
      maxCostUsd: 0.10
