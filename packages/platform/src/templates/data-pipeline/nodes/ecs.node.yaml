apiVersion: agentforge/v1
kind: NodeDefinition
metadata:
  name: ecs-worker
  displayName: AWS ECS Worker
  description: Cloud-native ETL execution on AWS ECS Fargate — requires agentforge
spec:
  type: remote
  capabilities: [docker, git, llm-access, cloud-storage]
  connection:
    type: http
    endpoint: "${ECS_AGENT_ENDPOINT}"
    auth:
      type: aws-sigv4
      region: "${AWS_REGION}"
  # Template default — override IMAGE_TAG with a versioned tag or digest for deterministic production deployments
  image: "${ECR_REPO}/agentforge-etl-worker:${IMAGE_TAG:-latest}"
  resources:
    maxConcurrentRuns: 10
    memory: 8g
    cpu: "4"
