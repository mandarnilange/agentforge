apiVersion: agentforge/v1
kind: PipelineDefinition
metadata:
  name: data-pipeline
  displayName: Data Pipeline
  description: Schema Designer → ETL Builder (test loop) → Validator (check loop) → Transformer (test loop) → Loader

spec:
  input:
    - name: brief
      type: raw-brief
      description: |
        Source data description (format, location, schema if known), target system,
        transformation requirements, data volume, scheduling needs, and cloud provider.
      required: true

  repository:
    mode: auto-init

  phases:
    - name: design
      phase: 1
      agents:
        - schema-designer
      gate:
        required: true
        approvers:
          minCount: 1
          roles: [admin, reviewer]

    - name: build
      phase: 2
      agents:
        - etl-builder

    - name: validate
      phase: 3
      agents:
        - validator

    - name: transform
      phase: 4
      agents:
        - transformer
      gate:
        required: true
        approvers:
          minCount: 1
          roles: [admin, reviewer]

    - name: deploy
      phase: 5
      agents:
        - loader

  gateDefaults:
    actions:
      - approve
      - reject
      - request-revision
    timeout: 72h

  wiring:
    etl-builder:
      data-schema: schema-designer
    validator:
      data-schema: schema-designer
      etl-code: etl-builder
    transformer:
      data-schema: schema-designer
      etl-code: etl-builder
      validation-report: validator
    loader:
      data-schema: schema-designer
      transform-code: transformer
      validation-report: validator

  retryPolicy:
    maxRetries: 2
    backoff: exponential
    initialDelay: 60s
