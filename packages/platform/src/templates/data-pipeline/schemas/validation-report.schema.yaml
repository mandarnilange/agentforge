$schema: "https://json-schema.org/draft/2020-12/schema"
title: Validation Report
description: Data quality validation results against schema contracts
type: object
required: [summary, overallStatus, checks]
properties:
  summary: { type: string }
  overallStatus:
    type: string
    enum: [passed, passed-with-warnings, failed]
  totalRecordsChecked: { type: integer, minimum: 0 }
  checks:
    type: array
    items:
      type: object
      required: [field, rule, status]
      properties:
        field: { type: string }
        rule: { type: string }
        status:
          type: string
          enum: [passed, failed, warning]
        failureCount: { type: integer }
        failureRate: { type: number }
        sampleFailures:
          type: array
          items: { type: string }
        recommendation: { type: string }
  dataQualityMetrics:
    type: object
    properties:
      nullRateByField:
        type: object
        description: "Map of field name to null rate (0.0–1.0)"
        additionalProperties: { type: number, minimum: 0, maximum: 1 }
      duplicateCount: { type: integer, minimum: 0 }
      typeErrorCount: { type: integer, minimum: 0 }
