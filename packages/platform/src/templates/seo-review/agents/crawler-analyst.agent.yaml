apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: crawler-analyst
  displayName: Crawler Analyst
  description: Technical SEO Analyst — audits on-page signals, meta tags, structured data, and crawlability
  phase: "1"
  role: seo-analyst
  humanEquivalent: Technical SEO Analyst

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: medium

  systemPrompt:
    file: prompts/crawler-analyst.system.md

  inputs:
    - type: raw-brief
      required: true

  outputs:
    - type: technical-seo-audit
      schema: schemas/technical-seo-audit.schema.yaml

  resources:
    budget:
      maxTotalTokens: 40000
      maxCostUsd: 0.10
