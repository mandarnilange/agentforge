apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: keyword-analyst
  displayName: Keyword Analyst
  description: Keyword Research Specialist — identifies gaps, opportunities, and search intent alignment
  phase: "2"
  role: keyword-specialist
  humanEquivalent: Keyword Research Specialist

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-6
    maxTokens: 16384
    thinking: medium

  systemPrompt:
    file: prompts/keyword-analyst.system.md

  inputs:
    - type: raw-brief
      required: true
    - type: technical-seo-audit
      required: true

  outputs:
    - type: keyword-analysis
      schema: schemas/keyword-analysis.schema.yaml

  resources:
    budget:
      maxTotalTokens: 40000
      maxCostUsd: 0.10
