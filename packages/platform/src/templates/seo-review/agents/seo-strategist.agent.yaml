apiVersion: agentforge/v1
kind: AgentDefinition
metadata:
  name: seo-strategist
  displayName: SEO Strategist
  description: SEO Strategist — synthesises all audit findings into a prioritised action plan with quick wins
  phase: "4"
  role: seo-strategist
  humanEquivalent: SEO Director

spec:
  executor: pi-ai

  model:
    provider: anthropic
    name: claude-sonnet-4-20250514
    maxTokens: 16384
    thinking: high

  systemPrompt:
    file: prompts/seo-strategist.system.md

  inputs:
    - type: technical-seo-audit
      required: true
    - type: keyword-analysis
      required: true
    - type: content-audit
      required: true

  outputs:
    - type: seo-action-plan
      schema: schemas/seo-action-plan.schema.yaml

  resources:
    budget:
      maxTotalTokens: 40000
      maxCostUsd: 0.12
